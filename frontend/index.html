<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Дайджест</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <nav class="tabs">
      <button class="tab active" data-tab="digest">Дайджест</button>
      <button class="tab" data-tab="channels">Каналы</button>
    </nav>

    <!-- Digest -->
    <div id="tab-digest" class="tab-content active">
      <button id="refresh-btn" class="btn-primary">
        <span>✨</span> Обновить дайджест
      </button>
      <div id="digest-list"></div>
    </div>

    <!-- Channels -->
    <div id="tab-channels" class="tab-content">
      <div class="add-form">
        <input id="ch-input" type="text" placeholder="@channel или channel" autocomplete="off" spellcheck="false" />
        <button id="add-btn" class="btn-primary">Добавить</button>
      </div>
      <div id="channels-list"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
